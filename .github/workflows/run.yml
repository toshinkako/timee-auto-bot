name: Timee Auto Bot

on:
  schedule:
    # 6:00 勤務予定確認
    - cron: '0 21 * * *'
    # 8:00 再確認
    - cron: '0 23 * * *'
    # 15:30 就業確認
    - cron: '30 6 * * *'
    # 16:00〜18:30 30分ごと再確認
    - cron: '0,30 7-9 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore last status
        uses: actions/cache@v4
        with:
          path: last_status.json
          key: status-${{ github.run_id }}
          restore-keys: status-

      - name: Check Vacancy Status
        id: check_skip
        run: |
          # 現在時刻の「時」を取得 (UTC 23時 = JST 08時)
          HOUR=$(date +%H)
          if [ "$HOUR" = "23" ] && [ -f last_status.json ]; then
            HAS_VACANCY=$(jq -r '.hasVacancies' last_status.json)
            echo "has_vacancy=$HAS_VACANCY" >> $GITHUB_OUTPUT
          else
            # 6:00実行時やファイルがない場合は必ず実行
            echo "has_vacancy=true" >> $GITHUB_OUTPUT
          fi
          
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ipafont-gothic
      - name: Install dependencies
        run: npm install

      - name: Run Timee Bot
        if: steps.check_skip.outputs.has_vacancy == 'true'
        run: node index.js
        env:
          TAIMEE_EMAIL: ${{ secrets.TAIMEE_EMAIL }}
          TAIMEE_PASSWORD: ${{ secrets.TAIMEE_PASSWORD }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Save status for next run
        if: always()
        uses: actions/cache@v4
        with:
          path: last_status.json
          key: status-${{ github.run_id }}-${{ github.run_number }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3 # 3日間保存

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: timee-excel
          path: "*.xlsx"
